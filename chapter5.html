<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- STYLES -->
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/palette.css">

  <!-- ANIMATION ENGINE — GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <!-- TOOLKIT CORE -->
  <script src="scene/animate.js"></script>
  <script src="scene/scene.js"></script>

  <!-- MODULES — add/remove as needed -->
  <script src="modules/card.js"></script>
  <script src="modules/arrow.js"></script>
  <script src="modules/text-elements.js"></script>
  <script src="modules/shapes.js"></script>
  <script src="modules/effects.js"></script>
  <script src="modules/tech-elements.js"></script>

</head>
<body>

  <!-- CANVAS — never touch this div -->
  <div id="canvas"></div>

  <!-- PLAY/RESET BUTTON -->
  <button id="play">▶</button>

  <script>
  // ================================================================
  //  SCENE SETUP
  //  Change sceneStart to match your first subtitle timestamp
  // ================================================================
  const sceneStart = "00:00:00,000"
  const scene = new Scene()

  // Transition Helper: fades out previous elements
  function fadeOutPrevious(duration = 0.5) {
    return {
      render: () => {}, // empty render
      animate: () => {
        document.querySelectorAll('#canvas > *:not(#play):not(#svg-layer)').forEach(el => {
          gsap.to(el, { opacity: 0, duration: duration });
        });
      }
    };
  }

  // ================================================================
  //  SCENE 1 (srt: 00:00:00,480) => trigger at ~0ms
  // ================================================================
  scene.add(new Img({
    src: "wk_inputs/chapter5_scene1.png",
    x: 260, y: 140, width: 1400,
    animation: "scalePop",
    loop: "breathe"
  }), { at: 0 })

  scene.add(new Title({
    text: "HI, I'M CHAKRADHAR",
    animation: "fadeIn"
  }), { at: 0 })

  // Fade out Scene 1 (500ms before Scene 2)
  scene.add(fadeOutPrevious(0.8), { at: 1980 })

  // ================================================================
  //  SCENE 2 (srt: 00:00:02,980) => trigger at 2480ms
  // ================================================================
  scene.add(new Img({
    src: "wk_inputs/chapter5_scene2.png",
    x: 260, y: 140, width: 1400,
    animation: "slideInRight",
    loop: "float"
  }), { at: 2480 })

  scene.add(new Tagline({
    text: "THE COMPLETE GUIDE TO VIBE CODING",
    borderColor: "cyan"
  }), { at: 3000 })

  // Fade out Scene 2 at the end
  scene.add(fadeOutPrevious(1.0), { at: 18000 })

  scene.play()

  // ================================================================
  //  END OF SCENE
  // ================================================================
  </script>

</body>
</html>
