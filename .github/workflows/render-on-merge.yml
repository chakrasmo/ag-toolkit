name: Render Animation to MP4

# Triggers automatically when a chapterX.html file is pushed or merged to main
on:
  push:
    branches:
      - main
    paths:
      - 'chapter*.html'   # Only runs when a chapter HTML file changes

  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      html_file:
        description: 'HTML file to render (e.g. chapter2.html)'
        required: true
      audio_file:
        description: 'Audio file path (e.g. wk_inputs/chapter2_audio.mp3)'
        required: true
      duration:
        description: 'Recording duration in seconds'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the full repo including wk_inputs media files
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install Python dependencies
      - name: Install Python dependencies
        run: |
          pip install playwright moviepy
          playwright install chromium
          playwright install-deps chromium

      # 4. Start virtual display (required for Playwright video recording on Linux)
      - name: Start virtual display (Xvfb)
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # 5. Detect which chapter HTML was changed (for push trigger)
      - name: Detect changed HTML file
        if: github.event_name == 'push'
        id: detect
        run: |
          # Get the changed chapter HTML file
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep 'chapter.*\.html' | head -1)
          echo "html_file=$CHANGED" >> $GITHUB_OUTPUT

          # Derive chapter name (e.g. chapter2 from chapter2.html)
          CHAPTER=$(echo $CHANGED | sed 's/\.html//')
          echo "chapter=$CHAPTER" >> $GITHUB_OUTPUT

          # Auto-detect audio file (any supported format)
          AUDIO=$(ls wk_inputs/${CHAPTER}_audio.* 2>/dev/null | head -1)
          echo "audio_file=$AUDIO" >> $GITHUB_OUTPUT

          # Auto-calculate duration from SRT last timestamp + 5s buffer
          SRT="wk_inputs/${CHAPTER}_timestamps.srt"
          if [ -f "$SRT" ]; then
            LAST_TS=$(grep --only-matching '[0-9]\{2\}:[0-9]\{2\}:[0-9]\{2\},[0-9]\{3\}' "$SRT" | tail -1)
            H=$(echo $LAST_TS | cut -d: -f1)
            M=$(echo $LAST_TS | cut -d: -f2)
            S=$(echo $LAST_TS | cut -d: -f3 | cut -d, -f1)
            DURATION=$(( 10#$H*3600 + 10#$M*60 + 10#$S + 5 ))
            echo "duration=$DURATION" >> $GITHUB_OUTPUT
          else
            echo "duration=120" >> $GITHUB_OUTPUT
          fi

      # 6. Run render.py — push trigger uses auto-detected values
      - name: Render (push trigger)
        if: github.event_name == 'push'
        run: |
          mkdir -p wk_outputs videos
          python render.py \
            --html "${{ steps.detect.outputs.html_file }}" \
            --audio "${{ steps.detect.outputs.audio_file }}" \
            --duration "${{ steps.detect.outputs.duration }}"

      # 7. Run render.py — manual trigger uses user-provided values
      - name: Render (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p wk_outputs videos
          python render.py \
            --html "${{ github.event.inputs.html_file }}" \
            --audio "${{ github.event.inputs.audio_file }}" \
            --duration "${{ github.event.inputs.duration }}"

      # 8. Upload the rendered MP4 as a downloadable artifact
      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video-${{ github.run_number }}
          path: wk_outputs/*.mp4
          retention-days: 30   # Keep for 30 days, then auto-delete
